<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="icon" type="image/png" href="assets/icons/m.png">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/contato.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/qr.css">
</head>
<body>
<div id="header"></div>

<section id="contato">
  <div class="container">
    <h2>Contato / Pedido de Oracao</h2>

    <form id="formContato">
      <div class="input-group">
        <span>👤</span>
        <input type="text" id="nome" placeholder="Seu Nome" required>
      </div>

      <div class="input-group">
        <span>📱</span>
        <input type="tel" id="telefone" placeholder="Telefone / WhatsApp" required>
      </div>

      <div class="input-group">
        <span>✉️</span>
        <input type="email" id="email" placeholder="E-mail" required>
      </div>

      <div class="input-group">
        <span>🏠</span>
        <input type="text" id="endereco" placeholder="Endereco">
      </div>

      <div class="input-group">
        <span>🙏</span>
        <textarea id="pedido" placeholder="Pedido de Oracao" required></textarea>
      </div>

      <button type="submit" id="btnEnviarContato">Enviar via WhatsApp</button>
    </form>

    <p class="info-text">
      Seus dados serao enviados para nossa equipe de atendimento.
    </p>
  </div>
</section>

<div id="qr"></div>
<div id="footer"></div>

<script src="js/include.js"></script>
<script src="js/contato.js"></script>
<script src="js/script.js"></script>
<script src="js/qr.js"></script>
</body>
</html>
